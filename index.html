<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samareh Jack</title>
<meta name="description" content="The office of Samareh Jack. Come in, look around, click on things.">
<link rel="preload" as="image" href="assets/door.jpg">
<link rel="preload" as="image" href="assets/office.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Spectral:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     THE OFFICE — sits beneath the door the whole time, fully lit.
     Hotspots are injected into #room by js/main.js from js/config.js.
     ════════════════════════════════════════════════════════════════════ -->
<div id="viewport" tabindex="-1">
  <div id="room" aria-label="My office. Objects in the room can be examined.">
    <img id="room-img" src="assets/office.jpg" alt="A warm, book-lined home office with a wooden desk, an armchair, a green sofa, and a Persian rug." draggable="false">
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     LOOK-AROUND BUTTON — re-pulses every hotspot on demand.
     ════════════════════════════════════════════════════════════════════ -->
<button id="look-around" hidden aria-label="Show everything in the room you can look at" title="Look around">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
       stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M1.5 12s3.8-6.5 10.5-6.5S22.5 12 22.5 12s-3.8 6.5-10.5 6.5S1.5 12 1.5 12Z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
</button>

<!-- ════════════════════════════════════════════════════════════════════
     THE DOOR — entrance overlay.

     #door-zoom holds the full hallway photo and does the walk-up
     (translate + scale) until ONLY the door leaf fills the screen.

     #door-leaf is a separate top-level panel — NOT inside #door-zoom, so
     no parent transform flattens its 3D. At the moment of opening, JS
     positions it exactly over the on-screen leaf, hides #door-zoom, and
     swings #door-leaf on its left edge. The perspective origin is pinned
     to the nameplate, so the plate stays square to you as it opens.
     ════════════════════════════════════════════════════════════════════ -->
<div id="door-overlay" role="button" tabindex="0"
     aria-label="A wooden door with a brass nameplate reading Samareh Jack. Click to come in.">

  <div id="door-zoom">
    <div id="door-pos" class="drifting">
      <img id="door-img" src="assets/door.jpg" alt="" draggable="false">
      <div id="door-plate" aria-hidden="true">Samareh&nbsp;Jack</div>
    </div>
  </div>

  <!-- The swinging leaf. JS sets its position/size/background and the
       plate placement, then adds .swing. -->
  <div id="door-leaf" hidden>
    <div id="door-leaf-plate" aria-hidden="true">Samareh&nbsp;Jack</div>
  </div>

  <p id="door-hint">click to come in</p>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     EXAMINE CARD — opens when an object is clicked.
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="examine-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="examine-title">
    <img id="examine-image" alt="" hidden>
    <h2 id="examine-title"></h2>
    <p class="card-body" id="examine-text"></p>
    <div class="card-actions" id="examine-actions">
      <button class="btn btn-quiet" id="examine-stay">Keep looking around</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     WELCOME CARD — opens from the guest chair.
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="welcome-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="welcome-title">
    <p class="eyebrow">Take a seat</p>
    <h2 id="welcome-title">Welcome. What brings you by?</h2>
    <div id="welcome-options" class="option-list"></div>
    <p class="card-body" id="welcome-response" hidden></p>
    <div class="card-actions" id="welcome-actions" hidden>
      <button class="btn btn-primary" id="welcome-done">Look around</button>
    </div>
    <p class="footnote">
      This room was drawn by AI.
      <button type="button" id="why-link" class="linklike">Here's why.</button>
    </p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     WHY-AI CARD — opens from the welcome footnote, layered over it.
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="why-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="why-title">
    <p class="eyebrow" id="why-eyebrow"></p>
    <h2 id="why-title"></h2>
    <div id="why-body"></div>
    <div class="card-actions">
      <button class="btn btn-quiet" id="why-close"></button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     ABOUT ME — the desk chair. Teaser first, then "read more" → full text.
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="about-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="about-title">
    <p class="eyebrow" id="about-eyebrow"></p>
    <h2 id="about-title"></h2>
    <div id="about-teaser"></div>
    <div id="about-full" hidden></div>
    <div class="card-actions">
      <button class="btn btn-primary" id="about-more"></button>
      <button class="btn btn-quiet" id="about-close">Keep looking around</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     CONTACT — the pencil holder. A message form that posts to Formspree.
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="contact-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="contact-title">
    <p class="eyebrow" id="contact-eyebrow"></p>
    <h2 id="contact-title"></h2>
    <p class="card-body" id="contact-intro"></p>
    <form id="contact-form" novalidate>
      <input type="hidden" name="type" value="contact">
      <input type="hidden" name="_subject" value="A note from the office">
      <label class="field"><span>Your name</span>
        <input name="name" type="text" autocomplete="name" required></label>
      <label class="field"><span>Email</span>
        <input name="email" type="email" autocomplete="email" required></label>
      <label class="field"><span>Message</span>
        <textarea name="message" rows="4" required></textarea></label>
      <div class="card-actions">
        <button type="submit" class="btn btn-primary" id="contact-submit"></button>
        <button type="button" class="btn btn-quiet" id="contact-close">Keep looking around</button>
      </div>
    </form>
    <p class="form-status" id="contact-status" hidden></p>
    <div class="card-actions" id="contact-done-actions" hidden>
      <button type="button" class="btn btn-quiet" id="contact-done-close">Keep looking around</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     GUEST BOOK — the books. Read existing entries, or sign the book
     (sign form posts to Formspree; entries are curated in by hand).
     ════════════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="guestbook-backdrop" hidden>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="guestbook-title">
    <p class="eyebrow" id="guestbook-eyebrow"></p>
    <h2 id="guestbook-title"></h2>

    <div id="guestbook-list-view">
      <div id="guestbook-entries"></div>
      <div class="card-actions">
        <button class="btn btn-primary" id="guestbook-sign-open"></button>
        <button class="btn btn-quiet" id="guestbook-close">Keep looking around</button>
      </div>
    </div>

    <form id="guestbook-sign-view" novalidate hidden>
      <input type="hidden" name="type" value="guestbook">
      <input type="hidden" name="_subject" value="A new guest-book entry">
      <p class="card-body" id="guestbook-prompt"></p>
      <label class="field"><span>Your name</span>
        <input name="name" type="text" autocomplete="name" required></label>
      <label class="field"><span>A link, if you'd like <em>(optional)</em></span>
        <input name="link" type="url" placeholder="https://"></label>
      <label class="field"><span>Your note</span>
        <textarea name="note" rows="4" required></textarea></label>
      <div class="card-actions">
        <button type="submit" class="btn btn-primary" id="guestbook-submit"></button>
        <button type="button" class="btn btn-quiet" id="guestbook-back">Back</button>
      </div>
    </form>

    <p class="form-status" id="guestbook-thanks" hidden></p>
    <div class="card-actions" id="guestbook-done-actions" hidden>
      <button type="button" class="btn btn-quiet" id="guestbook-done-close">Keep looking around</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     SITE WRAPPER — opens a link INSIDE the office (config link embed:true).
     A walnut bar over the dimmed room, the site in an iframe beneath it.
     "Back to the room" closes the panel and returns to the room (the
     examine card is already closed by then, never the door).
     ════════════════════════════════════════════════════════════════════ -->
<div id="site-wrapper" hidden>
  <div id="wrapper-panel">
    <div id="wrapper-bar">
      <button type="button" id="wrapper-back" aria-label="Back to the room">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        Back to the room
      </button>
      <span id="wrapper-title"></span>
      <a id="wrapper-newtab" href="#" target="_blank" rel="noopener">
        Open in new tab
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 5h5v5"/><path d="M19 5l-8 8"/>
          <path d="M19 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4"/>
        </svg>
      </a>
    </div>
    <div id="wrapper-stage">
      <iframe id="wrapper-frame" title="Embedded site" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
